name: VS Code Extension

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'extension/**'
      - 'src/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-extension.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: build-extension-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Read extension metadata
        id: meta
        run: |
          NAME=$(node -p "require('./extension/package.json').name")
          VERSION=$(node -p "require('./extension/package.json').version")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "vsix=${NAME}-${VERSION}.vsix" >> "$GITHUB_OUTPUT"

      - name: Build webview and package VSIX
        run: npm run package:extension

      - name: Verify VSIX exists
        run: |
          test -f "extension/${{ steps.meta.outputs.vsix }}" \
            || (echo "VSIX not found: extension/${{ steps.meta.outputs.vsix }}"; ls -la extension; exit 1)

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.name }}-${{ steps.meta.outputs.version }}-${{ github.sha }}
          path: extension/*.vsix
          if-no-files-found: error
          retention-days: 30

      - name: Attach VSIX to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: extension/*.vsix
          fail_on_unmatched_files: true
